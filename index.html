<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Shazam Tutorial | Kraft Land FF</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#121212;color:#fff;padding:10px}
.container{max-width:480px;margin:auto}

/* CABEÇALHO */
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:26px;font-weight:bold;color:#ffcc00;display:flex;align-items:center;justify-content:center;gap:8px;margin:10px 0}
.sincronizado{background:#000;border:1px solid #00c853;color:#00c853;padding:6px 12px;border-radius:20px;font-size:14px;display:inline-flex;align-items:center;gap:6px}
.sincronizado::before{content:'';width:8px;height:8px;background:#00c853;border-radius:50%;display:inline-block}

/* CARD */
.cartao{background:#1e1e1e;border-radius:12px;overflow:hidden;margin:15px 0;border:1px solid #333}
.cartao-topo{display:flex;gap:12px;padding:12px;align-items:flex-start}
.cartao img{width:120px;height:90px;border-radius:8px;object-fit:cover}
.cartao-info{flex:1}
.titulo{color:#ffcc00;font-size:17px;font-weight:bold;margin-bottom:6px}
.descricao{color:#ddd;font-size:14px;line-height:1.4}

/* BLOQUEADO */
.aviso-bloqueado{color:#ff4444;font-size:14px;font-weight:bold;padding:8px 12px;border-top:1px solid #333;border-bottom:1px solid #333;display:flex;align-items:center;gap:6px}
.aviso-bloqueado::before{content:'🔒'}
.codigo-traco{padding:12px;text-align:center;background:#252525;margin:0 12px;border-radius:6px;margin-bottom:10px}
.pontos{color:#666;font-size:20px;letter-spacing:4px}
.botao-oculto{background:#333;color:#999;border:none;padding:8px 16px;border-radius:6px;width:calc(100% - 24px);margin:0 12px 12px;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px}
.botao-oculto::before{content:'🔒'}

/* LIBERADO */
.aviso-liberado{color:#00c853;font-size:14px;font-weight:bold;padding:8px 12px;border-top:1px solid #333;border-bottom:1px solid #333;display:flex;align-items:center;gap:6px}
.aviso-liberado::before{content:'✅'}
.codigo-texto{background:#1a1a1a;color:#fff;padding:12px;border-radius:6px;margin:0 12px 10px;word-wrap:break-word;overflow-wrap:break-word;min-height:40px;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1.4}
.botao-copiar{background:#ffcc00;color:#000;border:none;padding:10px 16px;border-radius:6px;width:calc(100% - 24px);margin:0 12px 12px;font-weight:bold;cursor:pointer}
.botao-copiar:active{transform:scale(0.98)}

/* AVISO */
.aviso-copiado{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#00c853;color:#fff;padding:10px 20px;border-radius:8px;z-index:999;display:none;font-weight:bold}
</style>
</head>
<body>
<div class="aviso-copiado" id="aviso">COPIADO COM SUCESSO! ✅</div>

<div class="container">
  <!-- CABEÇALHO COM SEU NOME COMPLETO -->
  <div class="header">
    <h1>🔥 Shazam Tutorial 🔥 | Kraft Land FF</h1>
    <div class="sincronizado">SINCRONIZADO AO VIVO</div>
  </div>

  <div id="lista-itens"></div>
</div>

<script>
const ID_PLANILHA = "1qVFFrI8lmNO1BFKjVzun0c1k_iBXeT5-8ooxPkSxUG4";
const ABA = "Página1";

window.onload = () => {
  fetch(`https://opensheet.elk.sh/${ID_PLANILHA}/${ABA}`)
  .then(res => res.json())
  .then(dados => {
    let html = "";
    dados.forEach((linha, index) => {
      if(!linha.nome) return;

      let imagemHtml = linha.url ? `<img src="${linha.url.trim()}" alt="Imagem">` : "";
      let descricaoHtml = linha.descricao ? `<p class="descricao">${linha.descricao.trim()}</p>` : "";
      let codigoDoItem = linha.codigo ? linha.codigo.trim() : "";

      let liberado = (linha.liberado || "").toString().trim().toLowerCase() === "sim";

      let codigoHtml = "";
      if(liberado){
        codigoHtml = `
        <div class="aviso-liberado">✅ CÓDIGO REVELADO</div>
        <div class="codigo-texto" id="codigo${index}">${codigoDoItem}</div>
        <button class="botao-copiar" onclick="copiarCodigo('codigo${index}')">📋 COPIAR CÓDIGO</button>`;
      } else {
        codigoHtml = `
        <div class="aviso-bloqueado">🔒 CÓDIGO BLOQUEADO – ASSISTA AO VÍDEO NO CANAL PARA LIBERAR!</div>
        <div class="codigo-traco"><div class="pontos">•••••••••••••••••</div></div>
        <button class="botao-oculto">🔒 CÓDIGO OCULTO</button>`;
      }

      html += `
      <div class="cartao">
        <div class="cartao-topo">
          ${imagemHtml}
          <div class="cartao-info">
            <h3 class="titulo">${linha.nome.trim()}</h3>
            ${descricaoHtml}
          </div>
        </div>
        ${codigoHtml}
      </div>`;
    });
    document.getElementById("lista-itens").innerHTML = html;
  });
};

function copiarCodigo(id) {
  const texto = document.getElementById(id).innerText.trim();
  navigator.clipboard.writeText(texto).then(() => {
    const aviso = document.getElementById("aviso");
    aviso.style.display = "block";
    setTimeout(() => { aviso.style.display = "none"; }, 2000);
  });
}
</script>
</body>
</html>
